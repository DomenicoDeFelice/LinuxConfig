set -s default-terminal "tmux-256color"
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix
set -g history-limit 500000
set -g default-command "$SHELL"
# Refresh these env variables from the parent environment on tmux attach.
set -g update-environment "SWAYSOCK WAYLAND_DISPLAY DISPLAY"
bind-key -n S-Left previous-window
bind-key -n S-Right next-window
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Emacs-style pane management, partly taken from https://github.com/zhammer/hmux/
bind-key 0 if-shell "tmux display-message -p '#{window_panes}' | grep -v '^1$'"\
                "kill-pane"\
                "display 'Attempt to delete sole ordinary panel'"
bind-key 1 run-shell "tmux list-panes | grep -o '%[[:digit:]]\\+' | xargs -I{} sh -c \
                 'if [ #D != {} ]; then tmux kill-pane -t {}; fi'"
bind-key 2 split-window -v -c "#{pane_current_path}"
bind-key 3 split-window -h -c "#{pane_current_path}"
bind-key o select-pane -t :.+
